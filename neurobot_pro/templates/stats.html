<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estadísticas - NeuroBot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Panel de Rendimiento</h2>
            <a href="/" class="btn btn-secondary">Volver al Analizador</a>
        </div>

        <div class="row mb-4">
            <div class="col-md-6">
                <div class="card bg-dark text-white shadow">
                    <div class="card-body text-center">
                        <h5>Yield Total</h5>
                        <h2 class="{{ 'text-success' if yield_p > 0 else 'text-danger' }}">
                            {{ yield_p|round(2) }}%
                        </h2>
                    </div>
                </div>
            </div>
        </div>

        <h4>Pronósticos Pendientes</h4>
        <div class="table-responsive bg-white shadow-sm rounded">
            <table class="table align-middle mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>Partido</th>
                        <th>Cuota</th>
                        <th>EV</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody>
                    {% for p in pendientes %}
                    <tr>
                        <td>{{ p.local }} vs {{ p.visitante }}</td>
                        <td>{{ p.cuota_jugada }}</td>
                        <td>{{ p.ev_calculado }}</td>
                        <td>
                            <a href="/update/{{ p.id }}/GANADA" class="btn btn-sm btn-success">✅ Ganó</a>
                            <a href="/update/{{ p.id }}/PERDIDA" class="btn btn-sm btn-danger">❌ Perdió</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
